<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>matchBlade</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      /* expose the notch / home-indicator safe-area insets to JS (read in layout()). */
      :root {
        --sai-t: env(safe-area-inset-top, 0px);
        --sai-r: env(safe-area-inset-right, 0px);
        --sai-b: env(safe-area-inset-bottom, 0px);
        --sai-l: env(safe-area-inset-left, 0px);
      }
      /* 100dvh tracks the *visible* viewport (excludes mobile browser chrome); 100vh is the fallback. */
      html, body { width: 100vw; height: 100vh; height: 100dvh; overflow: hidden; background: #0a0b0f; }
      #game { width: 100vw; height: 100vh; height: 100dvh; display: flex; align-items: center; justify-content: center; }
      canvas { image-rendering: pixelated; display: block; }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
